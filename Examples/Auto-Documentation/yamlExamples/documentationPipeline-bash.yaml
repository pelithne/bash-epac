# Note - Create an Azure DevOps pipeline environment for the Documentation stage.
# This example uses AzureCLI@2 with bash scripts instead of PowerShell.
trigger: none

variables:
  PAC_OUTPUT_FOLDER: ./Output
  PAC_DEFINITIONS_FOLDER: ./Definitions
  pacEnvironmentSelector: <YOUR_PAC_ENVIRONMENT_SELECTOR>
  serviceConnectionPlan: <YOUR_SERVICE_CONNECTION_NAME>

pool:
  vmImage: "ubuntu-latest"

stages:
  - stage: Documentation
    displayName: "Document ${{ variables.pacEnvironmentSelector }}"
    condition: always()
    jobs:
      - job: Documentation
        displayName: "Create Documentation"
        steps:
          - template: templates/documentation-bash.yaml
            parameters:
              serviceConnection: $(serviceConnectionPlan)
              pacEnvironmentSelector: $(pacEnvironmentSelector)
