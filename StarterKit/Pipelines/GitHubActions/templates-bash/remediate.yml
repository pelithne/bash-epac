name: 'Reusable Workflow: Remediate'

on:
  workflow_call:
    inputs:
      pacEnvironmentSelector:
        required: true
        type: string
      planGitHubEnvironment:
        required: true
        type: string

jobs:
  remediate:
    runs-on: ubuntu-latest
    environment: ${{ inputs.planGitHubEnvironment }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          allow-no-subscriptions: true

      - name: Policy Remediation
        run: |
          scripts/operations/new-az-remediation-tasks.sh \
            --pac-selector ${{ inputs.pacEnvironmentSelector }} \
            --only-check-managed-assignments \
            --non-interactive
