name: Sync ALZ Policy Objects

# Before running this workflow, you must:
# 1. Create a policy default structure file using scripts/caf/new-alz-policy-default-structure.sh
#    Documentation: https://azure.github.io/enterprise-azure-policy-as-code/integrating-with-alz-library/
# 2. Configure the environment variables below to match your environment

env:
  REVIEWER: anwather # Change this to your GitHub username
  DefinitionsRootFolder: Definitions # Change this to the folder where your policy definitions are stored
  PacEnvironmentSelector: epac-dev # Change this to your PAC environment selector
  ALZLibraryType: ALZ # Change this to ALZ, AMBA, FSI, or SLZ as needed

on:
  workflow_dispatch

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync ALZ Policy Objects
        run: |
          scripts/caf/sync-alz-policy-from-library.sh \
            --definitions-root "$DefinitionsRootFolder" \
            --pac-selector "$PacEnvironmentSelector" \
            --type "$ALZLibraryType"
          branchName="caf-sync-$(date +%Y-%m-%d-%H-%M)"
          git config user.name "GitHub Actions Bot"
          git config user.email "<>"
          git checkout -b "$branchName"
          git add .
          git commit -m "Updated ALZ policy objects"
          git push --set-upstream origin "$branchName"
          gh pr create -B main -H "$branchName" \
            --title "Verify Synced Policies - $branchName" \
            -b "Checkout this PR branch and validate changes before merging." \
            --reviewer "$REVIEWER"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
