parameters:
  - name: serviceConnection
    type: string
  - name: pacEnvironmentSelector
    type: string
  - name: definitionsRootFolder
    type: string
    default: Definitions

steps:
  - checkout: self
  - task: AzureCLI@2
    name: documentation
    displayName: Build Documentation
    inputs:
      azureSubscription: ${{ parameters.serviceConnection }}
      scriptType: bash
      scriptLocation: scriptPath
      scriptPath: "scripts/operations/build-policy-documentation.sh"
      arguments: >-
        --wiki-clone-pat $(WikiClonePat)
  - publish: "$(PAC_OUTPUT_FOLDER)"
    artifact: "policy-documentation-${{ parameters.pacEnvironmentSelector }}"
