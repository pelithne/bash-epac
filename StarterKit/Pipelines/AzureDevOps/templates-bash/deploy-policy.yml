parameters:
  - name: serviceConnection
    type: string
  - name: pacEnvironmentSelector
    type: string

steps:
  - checkout: self
  - download: current
    artifact: "plans-${{ parameters.pacEnvironmentSelector }}"
  - task: AzureCLI@2
    displayName: Deploy Policy
    inputs:
      azureSubscription: ${{ parameters.serviceConnection }}
      scriptType: bash
      scriptLocation: scriptPath
      scriptPath: "scripts/deploy/deploy-policy-plan.sh"
      arguments: >-
        --pac-selector ${{ parameters.pacEnvironmentSelector }}
