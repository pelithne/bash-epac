parameters:
  - name: serviceConnection
    type: string
  - name: pacEnvironmentSelector
    type: string

steps:
  - checkout: self
  - task: AzureCLI@2
    name: PolicyRemediation
    displayName: Policy Remediation
    inputs:
      azureSubscription: ${{ parameters.serviceConnection }}
      scriptType: bash
      scriptLocation: scriptPath
      scriptPath: "scripts/operations/new-az-remediation-tasks.sh"
      arguments: >-
        --pac-selector ${{ parameters.pacEnvironmentSelector }}
        --only-check-managed-assignments
        --non-interactive
